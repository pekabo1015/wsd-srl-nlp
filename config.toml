[client]
showErrorDetails = true

[server]
maxUploadSize = 200
enableXsrfProtection = true
enableCORS = true
# 增加脚本执行超时，给大模型加载时间
scriptRunTimeout = 300

[theme]
primaryColor = "#FF6B6B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[logger]
level = "info"
